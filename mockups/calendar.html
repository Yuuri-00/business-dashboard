<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>投稿カレンダー | 副業管理ツール（モックアップ）</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <header class="bg-white border-b border-gray-200">
    <nav class="max-w-6xl mx-auto px-6 h-14 flex items-center gap-6 text-sm">
      <span class="font-bold text-gray-800 mr-4">🗂️ 副業管理ツール</span>
      <a href="dashboard.html" class="text-gray-500 hover:text-gray-800">ダッシュボード</a>
      <a href="calendar.html" class="font-semibold text-indigo-600">投稿カレンダー</a>
      <a href="todo.html" class="text-gray-500 hover:text-gray-800">今日のTODO</a>
      <a href="revenue.html" class="text-gray-500 hover:text-gray-800">収益管理</a>
      <a href="settings.html" class="text-gray-500 hover:text-gray-800">設定</a>
      <a href="login.html" class="text-gray-400 hover:text-gray-600 ml-auto">ログイン画面</a>
    </nav>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-8 space-y-5">

    <!-- フィルターチップ -->
    <div class="flex items-center gap-2 flex-wrap">
      <button class="text-xs font-medium px-3 py-1.5 rounded-full text-white" style="background:#1DA1F2">● X</button>
      <button class="text-xs font-medium px-3 py-1.5 rounded-full text-white" style="background:#E1306C">● Instagram</button>
      <button class="text-xs font-medium px-3 py-1.5 rounded-full text-white" style="background:#FF0000">● YouTube</button>
      <button class="text-xs font-medium px-3 py-1.5 rounded-full border-2" style="border-color:#16A34A; color:#16A34A">● ブログ（解除中）</button>
      <span class="w-px h-5 bg-gray-200 mx-2"></span>
      <button class="text-xs px-3 py-1.5 rounded-full border border-gray-300 text-gray-500 hover:bg-gray-100">全選択</button>
      <button class="text-xs px-3 py-1.5 rounded-full border border-gray-300 text-gray-500 hover:bg-gray-100">全解除</button>

      <div class="ml-auto flex items-center gap-2">
        <button class="text-xs px-3 py-1.5 rounded-lg bg-indigo-600 text-white font-medium">月表示</button>
        <button class="text-xs px-3 py-1.5 rounded-lg border border-gray-300 text-gray-500">週表示</button>
      </div>
    </div>

    <!-- 凡例 -->
    <div class="flex items-center gap-4 text-xs text-gray-500">
      <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full border-2 border-dashed border-gray-400 inline-block"></span>企画中</span>
      <span class="flex items-center gap-1">🕒 予約済</span>
      <span class="flex items-center gap-1">✓ 公開済</span>
    </div>

    <!-- カレンダー本体 -->
    <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
      <div class="flex items-center justify-between px-5 py-3 border-b border-gray-100">
        <button class="text-gray-400 hover:text-gray-700">←</button>
        <h2 class="font-semibold text-gray-800">2026年6月</h2>
        <button class="text-gray-400 hover:text-gray-700">→</button>
      </div>

      <div class="grid grid-cols-7 text-xs text-gray-400 border-b border-gray-100">
        <div class="py-2 text-center">日</div>
        <div class="py-2 text-center">月</div>
        <div class="py-2 text-center">火</div>
        <div class="py-2 text-center">水</div>
        <div class="py-2 text-center">木</div>
        <div class="py-2 text-center">金</div>
        <div class="py-2 text-center">土</div>
      </div>

      <div class="grid grid-cols-7">
        <!-- week 1 -->
        <div class="h-24 border-b border-r border-gray-100"></div>
        <div class="h-24 border-b border-r border-gray-100 p-1.5">
          <div class="text-xs text-gray-400 mb-1">1</div>
        </div>
        <div class="h-24 border-b border-r border-gray-100 p-1.5">
          <div class="text-xs text-gray-400 mb-1">2</div>
          <div class="flex items-center gap-1 text-[10px] rounded px-1 py-0.5 text-white" style="background:#1DA1F2">🕒 募集告知</div>
        </div>
        <div class="h-24 border-b border-r border-gray-100 p-1.5">
          <div class="text-xs text-gray-400 mb-1">3</div>
        </div>
        <div class="h-24 border-b border-r border-gray-100 p-1.5">
          <div class="text-xs text-gray-400 mb-1">4</div>
          <div class="flex items-center gap-1 text-[10px] rounded px-1 py-0.5 border-2 border-dashed" style="border-color:#E1306C; color:#E1306C">企画：リール案</div>
        </div>
        <div class="h-24 border-b border-r border-gray-100 p-1.5">
          <div class="text-xs text-gray-400 mb-1">5</div>
        </div>
        <div class="h-24 border-b border-gray-100 p-1.5">
          <div class="text-xs text-gray-400 mb-1">6</div>
        </div>

        <!-- week 2 -->
        <div class="h-24 border-b border-r border-gray-100 p-1.5"><div class="text-xs text-gray-400 mb-1">7</div></div>
        <div class="h-24 border-b border-r border-gray-100 p-1.5"><div class="text-xs text-gray-400 mb-1">8</div></div>
        <div class="h-24 border-b border-r border-gray-100 p-1.5">
          <div class="text-xs text-gray-400 mb-1">9</div>
          <div class="flex items-center gap-1 text-[10px] rounded px-1 py-0.5 text-white mb-0.5" style="background:#FF0000">✓ レビュー動画</div>
        </div>
        <div class="h-24 border-b border-r border-gray-100 p-1.5"><div class="text-xs text-gray-400 mb-1">10</div></div>
        <div class="h-24 border-b border-r border-gray-100 p-1.5"><div class="text-xs text-gray-400 mb-1">11</div></div>
        <div class="h-24 border-b border-r border-gray-100 p-1.5">
          <div class="text-xs text-gray-400 mb-1">12</div>
          <div class="flex items-center gap-1 text-[10px] rounded px-1 py-0.5 text-white mb-0.5" style="background:#1DA1F2">🕒 告知</div>
          <div class="flex items-center gap-1 text-[10px] rounded px-1 py-0.5 text-white mb-0.5" style="background:#E1306C">🕒 写真投稿</div>
        </div>
        <div class="h-24 border-b border-gray-100 p-1.5"><div class="text-xs text-gray-400 mb-1">13</div></div>

        <!-- week 3 -->
        <div class="h-24 border-b border-r border-gray-100 p-1.5"><div class="text-xs text-gray-400 mb-1">14</div></div>
        <div class="h-24 border-b border-r border-gray-100 p-1.5"><div class="text-xs text-gray-400 mb-1">15</div></div>
        <div class="h-24 border-b border-r border-gray-100 p-1.5"><div class="text-xs text-gray-400 mb-1">16</div></div>
        <div class="h-24 border-b border-r border-gray-100 p-1.5"><div class="text-xs text-gray-400 mb-1">17</div></div>
        <div class="h-24 border-b border-r border-gray-100 p-1.5"><div class="text-xs text-gray-400 mb-1">18</div></div>
        <div class="h-24 border-b border-r border-gray-100 p-1.5"><div class="text-xs text-gray-400 mb-1">19</div></div>
        <div class="h-24 border-b border-gray-100 p-1.5"><div class="text-xs text-gray-400 mb-1">20</div></div>

        <!-- week 4 (today = 6/21) -->
        <div class="h-24 border-b border-r border-gray-100 p-1.5 bg-indigo-50">
          <div class="text-xs font-bold text-indigo-600 mb-1">21</div>
          <div class="flex items-center gap-1 text-[10px] rounded px-1 py-0.5 text-white" style="background:#1DA1F2">🕒 告知スレッド</div>
        </div>
        <div class="h-24 border-b border-r border-gray-100 p-1.5">
          <div class="text-xs text-gray-400 mb-1">22</div>
          <div class="flex items-center gap-1 text-[10px] rounded px-1 py-0.5 text-white" style="background:#E1306C">🕒 リール</div>
        </div>
        <div class="h-24 border-b border-r border-gray-100 p-1.5"><div class="text-xs text-gray-400 mb-1">23</div></div>
        <div class="h-24 border-b border-r border-gray-100 p-1.5">
          <div class="text-xs text-gray-400 mb-1">24</div>
          <div class="flex items-center gap-1 text-[10px] rounded px-1 py-0.5 text-white" style="background:#FF0000">🕒 まとめ動画</div>
        </div>
        <div class="h-24 border-b border-r border-gray-100 p-1.5">
          <div class="text-xs text-gray-400 mb-1">25</div>
          <div class="flex items-center gap-1 text-[10px] rounded px-1 py-0.5 text-white" style="background:#16A34A">🕒 ブログ記事</div>
        </div>
        <div class="h-24 border-b border-r border-gray-100 p-1.5"><div class="text-xs text-gray-400 mb-1">26</div></div>
        <div class="h-24 border-b border-gray-100 p-1.5">
          <div class="text-xs text-gray-400 mb-1">27</div>
          <div class="flex gap-1 mb-0.5">
            <span class="w-2 h-2 rounded-full" style="background:#1DA1F2"></span>
            <span class="w-2 h-2 rounded-full" style="background:#E1306C"></span>
            <span class="w-2 h-2 rounded-full" style="background:#FF0000"></span>
          </div>
          <div class="text-[10px] text-gray-400">+2件</div>
        </div>

        <!-- week 5 -->
        <div class="h-24 border-r border-gray-100 p-1.5"><div class="text-xs text-gray-400 mb-1">28</div></div>
        <div class="h-24 border-r border-gray-100 p-1.5"><div class="text-xs text-gray-400 mb-1">29</div></div>
        <div class="h-24 border-r border-gray-100 p-1.5"><div class="text-xs text-gray-400 mb-1">30</div></div>
        <div class="h-24 border-r border-gray-100"></div>
        <div class="h-24 border-r border-gray-100"></div>
        <div class="h-24 border-r border-gray-100"></div>
        <div class="h-24"></div>
      </div>
    </div>

  </main>

</body>
</html>
